<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Fixed Stars Field is a browser-native field in Sol Public Garden for two sky traditions, patient looking, and recording what cannot yet be explained.">
  <title>Fixed Stars Field - Sol Public Garden</title>
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
  <style>
    :root {
      color-scheme: dark;
      --ink: #f5edda;
      --muted: #c8bda3;
      --panel: rgba(20, 24, 31, 0.78);
      --panel-strong: rgba(17, 21, 29, 0.9);
      --line: rgba(245, 237, 218, 0.18);
      --gold: #d7ad54;
      --fish: #75b6b8;
      --robe: #d4c4a2;
      --night: #080c13;
      --see: 0.64;
      --compare: 0.52;
      --record: 0.58;
      --wonder: 0.68;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--night);
    }

    body {
      min-height: 100svh;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
      touch-action: none;
    }

    .star-veil {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 68% 37%, rgba(117, 182, 184, calc(0.08 + var(--wonder) * 0.22)), transparent 26%),
        radial-gradient(circle at 42% 26%, rgba(215, 173, 84, calc(0.08 + var(--record) * 0.16)), transparent 24%),
        radial-gradient(circle at 18% 76%, rgba(212, 196, 162, 0.12), transparent 30%),
        linear-gradient(135deg, rgba(10, 13, 20, 0.18), transparent 48%, rgba(117, 182, 184, calc(var(--compare) * 0.12)));
      mix-blend-mode: screen;
      opacity: 0.94;
    }

    .shell {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(300px, 460px) minmax(320px, 440px);
      justify-content: space-between;
      gap: 28px;
      min-height: 100svh;
      padding: clamp(18px, 4vw, 56px);
      pointer-events: none;
    }

    .panel {
      align-self: start;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 26px 80px rgba(0, 0, 0, 0.34), inset 0 0 0 1px rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(24px) saturate(1.15);
      pointer-events: auto;
    }

    .title-panel {
      padding: clamp(24px, 4vw, 42px);
    }

    h1 {
      max-width: 390px;
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(52px, 6.2vw, 84px);
      line-height: 0.95;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .title-panel p {
      margin: 24px 0 0;
      padding-top: 18px;
      border-top: 1px solid rgba(245, 237, 218, 0.16);
      color: var(--muted);
      font-size: 17px;
      line-height: 1.48;
    }

    .mark {
      width: 58px;
      height: 58px;
      margin-top: 28px;
      border: 1px solid rgba(245, 237, 218, 0.18);
      border-radius: 999px;
      color: var(--gold);
      background: rgba(255, 255, 255, 0.04);
    }

    .controls-panel {
      display: grid;
      gap: 20px;
      padding: 26px;
      background: var(--panel-strong);
    }

    .control-row {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr) 38px;
      gap: 14px;
      align-items: center;
      min-height: 48px;
    }

    .control-row span:first-child {
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .value {
      color: var(--muted);
      font-size: 14px;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--gold);
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1px;
      margin-top: 2px;
      padding-top: 18px;
      border-top: 1px solid rgba(245, 237, 218, 0.14);
      background: rgba(245, 237, 218, 0.14);
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      border: 0;
      color: var(--ink);
      background: rgba(245, 237, 218, 0.11);
      font: inherit;
      font-size: 15px;
      font-weight: 760;
      cursor: pointer;
    }

    button:hover,
    button:focus-visible {
      background: rgba(245, 237, 218, 0.2);
    }

    button:focus-visible,
    input[type="range"]:focus-visible {
      outline: 2px solid rgba(215, 173, 84, 0.72);
      outline-offset: 3px;
    }

    .back-link {
      position: fixed;
      right: clamp(18px, 4vw, 56px);
      bottom: clamp(18px, 4vw, 42px);
      z-index: 3;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      min-width: 150px;
      border: 1px solid rgba(245, 237, 218, 0.18);
      border-radius: 8px;
      color: var(--ink);
      background: rgba(20, 24, 31, 0.72);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(16px);
      font-weight: 760;
      text-decoration: none;
    }

    @media (max-width: 820px) {
      body {
        overflow: auto;
      }

      canvas {
        min-height: 100svh;
      }

      .shell {
        display: flex;
        flex-direction: column;
        min-height: 100svh;
        padding: 18px;
      }

      .title-panel {
        padding: 24px;
      }

      h1 {
        font-size: clamp(42px, 13vw, 62px);
      }

      .title-panel p {
        font-size: 16px;
      }

      .controls-panel {
        margin-top: auto;
        padding: 18px;
        gap: 16px;
      }

      .control-row {
        grid-template-columns: 82px minmax(0, 1fr) 34px;
        gap: 10px;
      }

      .actions {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .back-link {
        position: relative;
        right: auto;
        bottom: auto;
        margin: 0 18px 18px auto;
      }
    }
  </style>
</head>
<body>
  <canvas id="fixed-stars" aria-label="An interactive star field holding two sky traditions and a luminous recorded mystery."></canvas>
  <div class="star-veil" aria-hidden="true"></div>

  <main class="shell">
    <section class="panel title-panel" aria-labelledby="fixed-stars-title">
      <h1 id="fixed-stars-title">Fixed Stars Field</h1>
      <p>Two traditions, one sky. Look again, compare the maps, and write down the mystery before it has a name.</p>
      <svg class="mark" viewBox="0 0 58 58" aria-hidden="true">
        <path d="M14 34c10-9 19-9 30-2-8 2-14 5-19 11-2-5-6-8-11-9Z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
        <path d="M13 22c9-5 21-5 32 0" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M29 10v38M17 16c8 7 16 7 24 0" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.58"/>
        <circle cx="40" cy="30" r="3" fill="currentColor" opacity="0.68"/>
      </svg>
    </section>

    <section class="panel controls-panel" aria-label="Fixed Stars Field controls">
      <label class="control-row">
        <span>Seeing</span>
        <input id="seeing" type="range" min="0" max="100" value="64">
        <span class="value" id="seeing-value">64</span>
      </label>
      <label class="control-row">
        <span>Compare</span>
        <input id="compare" type="range" min="0" max="100" value="52">
        <span class="value" id="compare-value">52</span>
      </label>
      <label class="control-row">
        <span>Record</span>
        <input id="record" type="range" min="0" max="100" value="58">
        <span class="value" id="record-value">58</span>
      </label>
      <label class="control-row">
        <span>Wonder</span>
        <input id="wonder" type="range" min="10" max="100" value="68">
        <span class="value" id="wonder-value">68</span>
      </label>

      <div class="actions" aria-label="Fixed Stars Field verbs">
        <button id="Observe" type="button">Observe</button>
        <button id="Invert" type="button">Invert</button>
        <button id="Name" type="button">Name</button>
        <button id="Clear" type="button">Clear</button>
      </div>
    </section>
  </main>

  <a class="back-link" href="index.html">All Instruments</a>

  <script>
    window.fixedStarsFieldReady = false;
    window.fixedStarsFieldErrors = [];
    document.documentElement.dataset.fixedStarsFieldReady = "false";
    window.addEventListener("error", (event) => {
      window.fixedStarsFieldErrors.push(event.message);
      document.documentElement.dataset.fixedStarsFieldErrors = window.fixedStarsFieldErrors.join(" | ");
    });

    const canvas = document.querySelector("#fixed-stars");
    const ctx = canvas.getContext("2d");
    const veil = document.querySelector(".star-veil");
    const controls = {
      seeing: document.querySelector("#seeing"),
      compare: document.querySelector("#compare"),
      record: document.querySelector("#record"),
      wonder: document.querySelector("#wonder")
    };
    const values = {
      seeing: document.querySelector("#seeing-value"),
      compare: document.querySelector("#compare-value"),
      record: document.querySelector("#record-value"),
      wonder: document.querySelector("#wonder-value")
    };
    const observe = document.querySelector("#Observe");
    const invert = document.querySelector("#Invert");
    const nameButton = document.querySelector("#Name");
    const clear = document.querySelector("#Clear");
    let width = 0;
    let height = 0;
    let dpr = 1;
    let tick = 0;
    let stars = [];
    let notes = [];
    let pulses = [];
    let invertView = false;
    let named = false;
    let pointer = { x: 0.64, y: 0.38 };

    const constellation = [
      { x: 0.29, y: 0.22, r: 2.2 },
      { x: 0.38, y: 0.29, r: 1.7 },
      { x: 0.49, y: 0.35, r: 2.6 },
      { x: 0.58, y: 0.41, r: 1.8 },
      { x: 0.69, y: 0.46, r: 2.1 },
      { x: 0.43, y: 0.54, r: 1.6 },
      { x: 0.55, y: 0.63, r: 1.8 },
      { x: 0.66, y: 0.72, r: 1.5 }
    ];

    function value(name) {
      return Number(controls[name].value);
    }

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      makeStars();
    }

    function makeStars() {
      stars = Array.from({ length: 180 }, (_, index) => ({
        x: ((index * 113) % 1000) / 1000,
        y: ((index * 271) % 1000) / 1000,
        r: 0.45 + (index % 9) * 0.18,
        phase: index * 0.53,
        warm: index % 4 === 0
      }));
    }

    function updateValues() {
      Object.keys(controls).forEach((key) => {
        values[key].textContent = controls[key].value;
      });
      veil.style.setProperty("--see", `${value("seeing") / 100}`);
      veil.style.setProperty("--compare", `${value("compare") / 100}`);
      veil.style.setProperty("--record", `${value("record") / 100}`);
      veil.style.setProperty("--wonder", `${value("wonder") / 100}`);
    }

    function pointFromEvent(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top
      };
    }

    function starPoint(point) {
      const compare = value("compare") / 100;
      const x = invertView ? 1 - point.x : point.x;
      const y = point.y;
      const drift = (compare - 0.5) * 34;
      return {
        x: x * width + Math.sin(point.y * 9 + tick * 0.003) * drift,
        y: y * height + Math.cos(point.x * 8 + tick * 0.002) * drift * 0.42
      };
    }

    function addPulse(x, y, size = 1) {
      pulses.push({ x, y, life: 1, size });
      if (pulses.length > 42) pulses = pulses.slice(-42);
    }

    function addNote(x, y) {
      notes.push({
        x,
        y,
        angle: (Math.random() - 0.5) * 0.7,
        life: 1,
        text: named ? "recorded smear" : "not yet named"
      });
      if (notes.length > 18) notes = notes.slice(-18);
    }

    function drawGround() {
      const see = value("seeing");
      const wonder = value("wonder");
      const night = ctx.createRadialGradient(width * 0.62, height * 0.38, 20, width * 0.55, height * 0.48, Math.max(width, height) * 0.92);
      night.addColorStop(0, `hsl(214 34% ${13 + wonder * 0.045}%)`);
      night.addColorStop(0.46, `hsl(222 34% ${8 + see * 0.025}%)`);
      night.addColorStop(1, "hsl(226 42% 4%)");
      ctx.fillStyle = night;
      ctx.fillRect(0, 0, width, height);

      ctx.save();
      ctx.globalCompositeOperation = "screen";
      stars.forEach((star) => {
        const flicker = 0.42 + Math.sin(tick * 0.018 + star.phase) * 0.18 + see / 180;
        ctx.beginPath();
        ctx.arc(star.x * width, star.y * height, star.r * (0.6 + see / 80), 0, Math.PI * 2);
        ctx.fillStyle = star.warm ? `rgba(240, 202, 124, ${flicker})` : `rgba(224, 238, 244, ${flicker * 0.82})`;
        ctx.fill();
      });
      ctx.restore();
    }

    function drawRobedFigure() {
      const compare = value("compare") / 100;
      const record = value("record") / 100;
      const body = constellation.map(starPoint);
      ctx.save();
      ctx.globalAlpha = 0.2 + (1 - compare) * 0.48;
      ctx.strokeStyle = `rgba(212, 196, 162, ${0.34 + record * 0.28})`;
      ctx.fillStyle = `rgba(212, 196, 162, ${0.08 + record * 0.06})`;
      ctx.lineWidth = 1.4 + record * 1.8;
      ctx.beginPath();
      ctx.moveTo(body[0].x, body[0].y);
      ctx.bezierCurveTo(body[2].x - 90, body[2].y + 52, body[5].x - 48, body[5].y + 72, body[6].x, body[6].y);
      ctx.bezierCurveTo(body[5].x + 72, body[5].y + 62, body[3].x + 92, body[3].y + 28, body[1].x, body[1].y);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(body[1].x - 110, body[1].y + 42);
      ctx.quadraticCurveTo(body[2].x, body[2].y + 8, body[4].x + 112, body[4].y + 56);
      ctx.stroke();

      ctx.beginPath();
      ctx.ellipse(body[2].x, body[2].y + 104, 64 + record * 22, 150, -0.12, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(body[1].x + 4, body[1].y - 16, 25, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    function drawFishTradition() {
      const compare = value("compare") / 100;
      const wonder = value("wonder") / 100;
      const center = starPoint({ x: 0.58, y: 0.44 });
      const tail = starPoint({ x: 0.32, y: 0.36 });
      const mouth = starPoint({ x: 0.75, y: 0.52 });
      ctx.save();
      ctx.globalAlpha = 0.24 + compare * 0.62;
      ctx.strokeStyle = `rgba(117, 182, 184, ${0.42 + wonder * 0.36})`;
      ctx.fillStyle = `rgba(117, 182, 184, ${0.08 + wonder * 0.08})`;
      ctx.lineWidth = 1.7 + compare * 2;
      ctx.beginPath();
      ctx.moveTo(tail.x, tail.y);
      ctx.bezierCurveTo(center.x - 110, center.y - 90, mouth.x - 52, mouth.y - 74, mouth.x, mouth.y);
      ctx.bezierCurveTo(mouth.x - 54, mouth.y + 70, center.x - 98, center.y + 76, tail.x, tail.y);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(tail.x, tail.y);
      ctx.lineTo(tail.x - 56, tail.y - 44);
      ctx.lineTo(tail.x - 42, tail.y + 44);
      ctx.closePath();
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(mouth.x - 42, mouth.y - 15, 4.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(245, 237, 218, ${0.42 + wonder * 0.38})`;
      ctx.fill();
      ctx.restore();
    }

    function drawConstellation() {
      const record = value("record") / 100;
      const body = constellation.map(starPoint);
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.lineWidth = 1.1 + record * 1.3;
      ctx.strokeStyle = `rgba(215, 173, 84, ${0.2 + record * 0.48})`;
      ctx.beginPath();
      body.forEach((point, index) => {
        if (index === 0) ctx.moveTo(point.x, point.y);
        else ctx.lineTo(point.x, point.y);
      });
      ctx.stroke();

      body.forEach((point, index) => {
        const radius = constellation[index].r * (1.4 + value("seeing") / 48);
        ctx.beginPath();
        ctx.arc(point.x, point.y, radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 232, 165, ${0.72 + Math.sin(tick * 0.02 + index) * 0.18})`;
        ctx.shadowColor = "rgba(215, 173, 84, 0.72)";
        ctx.shadowBlur = 10 + record * 18;
        ctx.fill();
      });
      ctx.restore();
    }

    function drawSmear() {
      const wonder = value("wonder") / 100;
      const record = value("record") / 100;
      const mouth = starPoint({ x: 0.75, y: 0.52 });
      ctx.save();
      ctx.translate(mouth.x + Math.sin(tick * 0.01) * 4, mouth.y + Math.cos(tick * 0.008) * 3);
      ctx.rotate(-0.25 + Math.sin(tick * 0.005) * 0.08);
      ctx.globalCompositeOperation = "screen";
      for (let i = 0; i < 7; i += 1) {
        ctx.beginPath();
        ctx.ellipse(0, 0, 18 + i * 8 + wonder * 24, 6 + i * 3 + record * 8, 0, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(188, 222, 226, ${0.13 + (7 - i) * 0.035 + wonder * 0.04})`;
        ctx.lineWidth = 1.2;
        ctx.stroke();
      }
      ctx.beginPath();
      ctx.arc(0, 0, 4 + wonder * 4, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(245, 237, 218, ${0.42 + wonder * 0.38})`;
      ctx.shadowColor = "rgba(188, 222, 226, 0.86)";
      ctx.shadowBlur = 22 + wonder * 36;
      ctx.fill();
      ctx.restore();
    }

    function drawPulses() {
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      pulses.forEach((pulse) => {
        const radius = 18 + (1 - pulse.life) * 180 * pulse.size;
        ctx.beginPath();
        ctx.arc(pulse.x, pulse.y, radius, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(215, 173, 84, ${pulse.life * 0.32})`;
        ctx.lineWidth = 1.2;
        ctx.stroke();
        pulse.life -= 0.009;
      });
      pulses = pulses.filter((pulse) => pulse.life > 0);
      ctx.restore();
    }

    function drawNotes() {
      ctx.save();
      notes.forEach((note) => {
        ctx.save();
        ctx.translate(note.x, note.y);
        ctx.rotate(note.angle);
        ctx.globalAlpha = note.life;
        ctx.fillStyle = "rgba(17, 21, 29, 0.68)";
        ctx.strokeStyle = "rgba(245, 237, 218, 0.2)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(-54, -18, 108, 36, 6);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "rgba(245, 237, 218, 0.78)";
        ctx.font = "12px Inter, ui-sans-serif, system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(note.text, 0, 4);
        ctx.restore();
        note.life -= 0.0012;
      });
      notes = notes.filter((note) => note.life > 0.22);
      ctx.restore();
    }

    function draw() {
      drawGround();
      drawRobedFigure();
      drawFishTradition();
      drawConstellation();
      drawSmear();
      drawPulses();
      drawNotes();
      tick += 1;
      requestAnimationFrame(draw);
    }

    Object.values(controls).forEach((control) => {
      control.addEventListener("input", updateValues);
    });

    canvas.addEventListener("pointermove", (event) => {
      const point = pointFromEvent(event);
      pointer = { x: point.x / Math.max(width, 1), y: point.y / Math.max(height, 1) };
      if (event.buttons) addPulse(point.x, point.y, 0.55);
    });

    canvas.addEventListener("pointerdown", (event) => {
      const point = pointFromEvent(event);
      addPulse(point.x, point.y, 0.9);
      addNote(point.x, point.y);
    });

    observe.addEventListener("click", () => {
      const mouth = starPoint({ x: 0.75, y: 0.52 });
      controls.seeing.value = Math.min(100, value("seeing") + 8);
      addPulse(mouth.x, mouth.y, 1.1);
      updateValues();
    });

    invert.addEventListener("click", () => {
      invertView = !invertView;
      invert.textContent = invertView ? "Earth" : "Invert";
      const center = starPoint({ x: 0.52, y: 0.44 });
      addPulse(center.x, center.y, 1.35);
    });

    nameButton.addEventListener("click", () => {
      named = !named;
      nameButton.textContent = named ? "Unname" : "Name";
      controls.record.value = Math.min(100, value("record") + 10);
      const mouth = starPoint({ x: 0.75, y: 0.52 });
      addNote(mouth.x, mouth.y);
      updateValues();
    });

    clear.addEventListener("click", () => {
      notes = [];
      pulses = [];
      named = false;
      nameButton.textContent = "Name";
      invertView = false;
      invert.textContent = "Invert";
    });

    window.addEventListener("resize", resize);
    resize();
    updateValues();
    addPulse(width * 0.75, height * 0.52, 1.2);
    addNote(width * 0.75, height * 0.52);
    draw();
    window.fixedStarsFieldReady = true;
    document.documentElement.dataset.fixedStarsFieldReady = "true";
  </script>
</body>
</html>
