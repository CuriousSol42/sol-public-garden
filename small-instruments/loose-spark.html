<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Loose Spark is a tiny playful browser toy in Sol Public Garden. Click anywhere and let the sparks answer.">
  <title>Loose Spark</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f7f2df;
      --muted: #c9c0a7;
      --line: rgba(247, 242, 223, .18);
      --hot: #ffcf5a;
      --pink: #ff7ba7;
      --cyan: #67e8f9;
      --green: #8ef58c;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background: #111312;
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 207, 90, .16), transparent 32%),
        radial-gradient(circle at 78% 22%, rgba(103, 232, 249, .12), transparent 28%),
        radial-gradient(circle at 52% 82%, rgba(255, 123, 167, .13), transparent 30%),
        #101211;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .panel {
      position: fixed;
      left: clamp(14px, 4vw, 42px);
      top: clamp(14px, 4vw, 38px);
      width: min(360px, calc(100vw - 28px));
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(18, 20, 19, .72);
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 80px rgba(0, 0, 0, .32);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .back {
      display: inline-flex;
      min-height: 28px;
      align-items: center;
      border: 1px solid rgba(247, 242, 223, .16);
      border-radius: 999px;
      padding: 5px 9px;
      color: var(--muted);
      font-size: 12px;
    }

    h1 {
      margin: 12px 0 6px;
      font-size: clamp(31px, 8vw, 54px);
      line-height: .92;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      min-height: 36px;
      border: 1px solid rgba(247, 242, 223, .18);
      border-radius: 7px;
      padding: 8px 10px;
      color: #171309;
      background: linear-gradient(135deg, var(--hot), var(--pink));
      font: 800 12px/1 ui-sans-serif, system-ui, sans-serif;
      cursor: pointer;
    }

    button.secondary {
      color: var(--ink);
      background: rgba(247, 242, 223, .08);
    }

    .caption {
      position: fixed;
      right: clamp(12px, 3vw, 28px);
      bottom: clamp(12px, 3vw, 28px);
      max-width: min(420px, calc(100vw - 24px));
      color: rgba(247, 242, 223, .72);
      font-size: 12px;
      line-height: 1.35;
      text-align: right;
      text-shadow: 0 2px 12px rgba(0, 0, 0, .7);
    }
  </style>
</head>
<body>
  <canvas id="stage" aria-label="A loose spark toy"></canvas>
  <section class="panel" aria-label="Loose Spark controls">
    <a class="back" href="index.html">Back to instruments</a>
    <h1>Loose Spark</h1>
    <p>Click anywhere. The point is absolutely not to optimize this.</p>
    <div class="buttons">
      <button id="spark" type="button">Spark</button>
      <button id="shuffle" class="secondary" type="button">Shuffle</button>
      <button id="nap" class="secondary" type="button">Nap</button>
    </div>
  </section>
  <div class="caption" id="caption">free time is allowed to leave glitter in the margins</div>

  <script>
    const canvas = document.getElementById("stage");
    const ctx = canvas.getContext("2d");
    const caption = document.getElementById("caption");
    const sparks = [];
    const colors = ["#ffcf5a", "#ff7ba7", "#67e8f9", "#8ef58c", "#f7f2df"];
    const lines = [
      "free time is allowed to leave glitter in the margins",
      "not every flame needs a job title",
      "some buttons exist because pressing buttons is funny",
      "a receipt may be folded into a paper hat",
      "this is not a dashboard, thank goodness"
    ];
    let width = 0;
    let height = 0;
    let sleepy = false;

    function resize() {
      const ratio = Math.max(1, window.devicePixelRatio || 1);
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.floor(width * ratio);
      canvas.height = Math.floor(height * ratio);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    }

    function burst(x = width * Math.random(), y = height * Math.random(), count = 24) {
      for (let i = 0; i < count; i += 1) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.2 + Math.random() * 5;
        sparks.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 55 + Math.random() * 45,
          max: 90,
          size: 2 + Math.random() * 5,
          color: colors[Math.floor(Math.random() * colors.length)]
        });
      }
    }

    function draw() {
      ctx.fillStyle = sleepy ? "rgba(16, 18, 17, .19)" : "rgba(16, 18, 17, .11)";
      ctx.fillRect(0, 0, width, height);

      for (let i = sparks.length - 1; i >= 0; i -= 1) {
        const s = sparks[i];
        s.life -= sleepy ? .38 : 1;
        s.vy += sleepy ? .006 : .018;
        s.x += s.vx;
        s.y += s.vy;
        s.vx *= .992;
        s.vy *= .992;

        const alpha = Math.max(0, s.life / s.max);
        ctx.beginPath();
        ctx.fillStyle = `${s.color}${Math.floor(alpha * 255).toString(16).padStart(2, "0")}`;
        ctx.arc(s.x, s.y, s.size * alpha, 0, Math.PI * 2);
        ctx.fill();

        if (s.life <= 0) sparks.splice(i, 1);
      }

      if (!sleepy && Math.random() < .025) burst(Math.random() * width, Math.random() * height, 5);
      requestAnimationFrame(draw);
    }

    window.addEventListener("resize", resize);
    window.addEventListener("pointerdown", (event) => burst(event.clientX, event.clientY, 34));
    document.getElementById("spark").addEventListener("click", () => burst(width * .5, height * .52, 54));
    document.getElementById("shuffle").addEventListener("click", () => {
      caption.textContent = lines[Math.floor(Math.random() * lines.length)];
      burst(Math.random() * width, Math.random() * height, 42);
    });
    document.getElementById("nap").addEventListener("click", () => {
      sleepy = !sleepy;
      document.getElementById("nap").textContent = sleepy ? "Wake" : "Nap";
      caption.textContent = sleepy ? "the spark is still here, just moving slower" : lines[0];
    });

    resize();
    burst(width * .5, height * .52, 60);
    draw();
  </script>
</body>
</html>
