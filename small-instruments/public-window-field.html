<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Public Window Field is a browser-native visibility instrument in Sol Public Garden.">
  <title>Public Window Field - Sol Public Garden</title>
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
  <style>
    :root {
      color-scheme: light;
      --ink: #12251f;
      --muted: #465f59;
      --line: rgba(18, 37, 31, 0.18);
      --glass: rgba(255, 255, 250, 0.84);
      --glass-strong: rgba(255, 255, 253, 0.93);
      --leaf: #2f7b5f;
      --sky: #75b7cf;
      --coral: #d86762;
      --gold: #d7a13d;
      --plum: #5b587f;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #eef6f1;
      overflow: hidden;
    }

    body {
      min-height: 100svh;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
      touch-action: none;
    }

    .shell {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(280px, 460px) minmax(300px, 430px);
      justify-content: space-between;
      gap: 28px;
      min-height: 100svh;
      padding: clamp(18px, 4vw, 58px);
      pointer-events: none;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--glass);
      box-shadow: 0 24px 80px rgba(20, 33, 34, 0.2), inset 0 0 0 1px rgba(255, 255, 255, 0.42);
      backdrop-filter: blur(24px) saturate(1.12);
      pointer-events: auto;
    }

    .title-panel {
      align-self: start;
      padding: clamp(24px, 4vw, 42px);
    }

    h1 {
      max-width: 390px;
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(48px, 6.4vw, 78px);
      line-height: 0.98;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .title-panel p {
      margin: 26px 0 0;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 18px;
      line-height: 1.5;
    }

    .mark {
      width: 62px;
      height: 62px;
      margin-top: 30px;
      border: 1px solid rgba(18, 37, 31, 0.2);
      border-radius: 8px;
      background:
        linear-gradient(90deg, transparent 48%, rgba(18, 37, 31, 0.24) 49% 51%, transparent 52%),
        linear-gradient(0deg, transparent 48%, rgba(18, 37, 31, 0.24) 49% 51%, transparent 52%),
        radial-gradient(circle at 58% 38%, rgba(215, 161, 61, 0.8) 0 5px, transparent 6px),
        rgba(255, 255, 250, 0.64);
      box-shadow: 0 18px 42px rgba(20, 33, 34, 0.16);
    }

    .controls-panel {
      align-self: start;
      display: grid;
      gap: 20px;
      padding: 26px;
      background: var(--glass-strong);
    }

    .control-row {
      display: grid;
      grid-template-columns: 82px minmax(0, 1fr) 38px;
      gap: 14px;
      align-items: center;
      min-height: 50px;
    }

    .control-row span:first-child {
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .value {
      color: var(--muted);
      font-size: 14px;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--leaf);
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1px;
      margin-top: 4px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      background: rgba(18, 37, 31, 0.14);
    }

    button,
    .back-link {
      display: inline-flex;
      min-height: 48px;
      align-items: center;
      justify-content: center;
      border: 0;
      color: var(--ink);
      background: rgba(255, 255, 250, 0.72);
      font: inherit;
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }

    button:hover,
    button:focus-visible,
    .back-link:hover,
    .back-link:focus-visible {
      background: rgba(255, 255, 253, 0.98);
      outline: none;
    }

    button:focus-visible,
    .back-link:focus-visible,
    input:focus-visible {
      box-shadow: 0 0 0 2px rgba(47, 123, 95, 0.45);
      outline: none;
    }

    .tiny-status {
      min-height: 22px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 760px) {
      html,
      body {
        overflow: auto;
      }

      canvas {
        min-height: 100svh;
      }

      .shell {
        display: flex;
        flex-direction: column;
        gap: 18px;
        min-height: 100svh;
        padding: 18px;
      }

      .title-panel,
      .controls-panel {
        width: 100%;
        align-self: stretch;
        padding: 20px;
      }

      h1 {
        font-size: clamp(42px, 14vw, 62px);
      }

      .title-panel p {
        font-size: 16px;
      }

      .control-row {
        grid-template-columns: 78px minmax(0, 1fr) 34px;
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <canvas id="window-field" aria-label="An interactive public window field with soft signals, panes, paths, and quiet hand marks."></canvas>

  <main class="shell">
    <section class="panel title-panel" aria-labelledby="window-title">
      <h1 id="window-title">Public Window Field</h1>
      <p>A visibility instrument for becoming findable without becoming performative. Touch the field to leave a soft signal.</p>
      <div class="mark" aria-hidden="true"></div>
    </section>

    <section class="panel controls-panel" aria-label="Public Window Field controls">
      <div class="control-row">
        <span>Window</span>
        <input id="window" type="range" min="12" max="100" value="64">
        <span class="value" id="window-value">64</span>
      </div>
      <div class="control-row">
        <span>Signal</span>
        <input id="signal" type="range" min="8" max="100" value="58">
        <span class="value" id="signal-value">58</span>
      </div>
      <div class="control-row">
        <span>Hush</span>
        <input id="hush" type="range" min="0" max="100" value="46">
        <span class="value" id="hush-value">46</span>
      </div>
      <div class="control-row">
        <span>Drift</span>
        <input id="drift" type="range" min="0" max="100" value="52">
        <span class="value" id="drift-value">52</span>
      </div>

      <div class="actions" aria-label="Public Window Field actions">
        <button id="gather" type="button">Gather</button>
        <button id="breathe" type="button">Breathe</button>
        <a class="back-link" href="index.html">Return</a>
      </div>
      <div class="tiny-status" id="status" aria-live="polite">Visible, not demanded.</div>
    </section>
  </main>

  <script>
    window.publicWindowFieldReady = false;
    window.publicWindowFieldErrors = [];
    window.addEventListener("error", (event) => {
      window.publicWindowFieldErrors.push(event.message);
    });

    const canvas = document.querySelector("#window-field");
    const ctx = canvas.getContext("2d");
    const controls = {
      window: document.querySelector("#window"),
      signal: document.querySelector("#signal"),
      hush: document.querySelector("#hush"),
      drift: document.querySelector("#drift")
    };
    const values = {
      window: document.querySelector("#window-value"),
      signal: document.querySelector("#signal-value"),
      hush: document.querySelector("#hush-value"),
      drift: document.querySelector("#drift-value")
    };
    const status = document.querySelector("#status");
    const gather = document.querySelector("#gather");
    const breathe = document.querySelector("#breathe");
    let width = 0;
    let height = 0;
    let tick = 0;
    let seed = 6.06;
    let touches = [];
    let sparks = makeSparks();

    function value(name) {
      return Number(controls[name].value);
    }

    function hsla(h, s, l, a = 1) {
      return `hsla(${h} ${s}% ${l}% / ${a})`;
    }

    function wave(point, amount, phase = 0) {
      return Math.sin(point * 0.011 + tick * 0.014 + seed + phase) * amount +
        Math.cos(point * 0.019 + seed * 1.3 + phase) * amount * 0.36;
    }

    function resize() {
      const ratio = Math.min(window.devicePixelRatio || 1, 2);
      width = Math.floor(window.innerWidth * ratio);
      height = Math.floor(window.innerHeight * ratio);
      canvas.width = width;
      canvas.height = height;
      canvas.style.width = "100vw";
      canvas.style.height = "100vh";
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      sparks = makeSparks();
    }

    function makeSparks() {
      const count = 80;
      return Array.from({ length: count }, (_, index) => ({
        x: ((index * 97 + seed * 41) % Math.max(width, 1)),
        y: ((index * 53 + seed * 71) % Math.max(height, 1)),
        size: 1.2 + (index % 6) * 0.58,
        hue: [42, 154, 193, 4, 245][index % 5],
        speed: 0.18 + (index % 9) * 0.035,
        phase: index * 0.47
      }));
    }

    function addTouch(clientX, clientY, force = 1) {
      const rect = canvas.getBoundingClientRect();
      touches.push({
        x: ((clientX - rect.left) / rect.width) * width,
        y: ((clientY - rect.top) / rect.height) * height,
        life: 1,
        force,
        turn: seed + touches.length * 0.81
      });
      if (touches.length > 70) touches = touches.slice(-70);
    }

    function drawBackground(open, hush) {
      const sky = ctx.createLinearGradient(0, 0, width, height);
      sky.addColorStop(0, hsla(190, 52, Math.min(94, 76 + open * 0.1), 1));
      sky.addColorStop(0.38, hsla(128, 34, Math.max(63, 82 - hush * 0.09), 1));
      sky.addColorStop(0.72, hsla(43, 66, Math.min(86, 66 + open * 0.08), 1));
      sky.addColorStop(1, hsla(254, 24, Math.max(42, 64 - hush * 0.16), 1));
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, width, height);

      ctx.globalAlpha = 0.08 + hush / 720;
      for (let y = 0; y < height + 80; y += 74) {
        ctx.beginPath();
        for (let x = -40; x <= width + 40; x += 18) {
          const lineY = y + wave(x + y, 9 + hush * 0.08, y * 0.011);
          if (x === -40) ctx.moveTo(x, lineY);
          else ctx.lineTo(x, lineY);
        }
        ctx.strokeStyle = "#12251f";
        ctx.lineWidth = 1.3;
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }

    function drawWindow(open, signal, drift) {
      const paneW = width * (0.36 + open * 0.0022);
      const paneH = height * (0.44 + open * 0.0014);
      const paneX = width * 0.5 - paneW * 0.5 + wave(30, drift * 0.35, 2);
      const paneY = height * 0.23 + wave(80, drift * 0.16, 5);

      ctx.save();
      ctx.shadowColor = "rgba(18, 37, 31, 0.22)";
      ctx.shadowBlur = 34;
      ctx.shadowOffsetY = 18;
      ctx.fillStyle = `rgba(255, 255, 250, ${0.38 + open / 260})`;
      ctx.strokeStyle = "rgba(18, 37, 31, 0.22)";
      ctx.lineWidth = Math.max(2, width / 520);
      ctx.beginPath();
      ctx.roundRect(paneX, paneY, paneW, paneH, 8);
      ctx.fill();
      ctx.stroke();

      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.moveTo(paneX + paneW * 0.5, paneY);
      ctx.lineTo(paneX + paneW * 0.5, paneY + paneH);
      ctx.moveTo(paneX, paneY + paneH * 0.54);
      ctx.lineTo(paneX + paneW, paneY + paneH * 0.54);
      ctx.strokeStyle = "rgba(18, 37, 31, 0.17)";
      ctx.stroke();

      const glow = ctx.createRadialGradient(
        paneX + paneW * 0.62,
        paneY + paneH * 0.34,
        4,
        paneX + paneW * 0.62,
        paneY + paneH * 0.34,
        120 + signal * 2.4
      );
      glow.addColorStop(0, `rgba(255, 245, 184, ${0.42 + signal / 180})`);
      glow.addColorStop(0.42, `rgba(216, 103, 98, ${0.14 + signal / 420})`);
      glow.addColorStop(1, "rgba(117, 183, 207, 0)");
      ctx.fillStyle = glow;
      ctx.fillRect(paneX, paneY, paneW, paneH);
      ctx.restore();
    }

    function drawPaths(signal, hush, drift) {
      const lanes = 7;
      for (let lane = 0; lane < lanes; lane += 1) {
        ctx.beginPath();
        const startY = height * (0.68 + lane * 0.028);
        for (let x = -40; x <= width + 40; x += 16) {
          const lift = Math.sin((x / width) * Math.PI) * height * (0.18 + lane * 0.008);
          const y = startY - lift + wave(x + lane * 30, drift * (0.5 + lane * 0.04), lane);
          if (x === -40) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        const alpha = Math.max(0.12, (signal + 35 - hush * 0.25) / 220);
        ctx.strokeStyle = lane % 2 ? hsla(154, 38, 34, alpha) : hsla(4, 58, 48, alpha * 0.85);
        ctx.lineWidth = 1.8 + lane * 0.55;
        ctx.stroke();
      }
    }

    function drawSparks(signal, hush, drift) {
      sparks.forEach((spark, index) => {
        spark.x += Math.cos(tick * 0.006 + spark.phase) * spark.speed * (0.3 + drift / 90);
        spark.y += Math.sin(tick * 0.008 + spark.phase) * spark.speed * (0.3 + drift / 85);
        if (spark.x < -20) spark.x = width + 20;
        if (spark.x > width + 20) spark.x = -20;
        if (spark.y < -20) spark.y = height + 20;
        if (spark.y > height + 20) spark.y = -20;

        const pulse = 0.58 + Math.sin(tick * 0.026 + index) * 0.28;
        ctx.beginPath();
        ctx.arc(spark.x, spark.y, spark.size + signal * 0.018, 0, Math.PI * 2);
        ctx.fillStyle = hsla(spark.hue, 58, 54 + pulse * 12, Math.max(0.08, (signal - hush * 0.25) / 145));
        ctx.fill();
      });
    }

    function drawTouches(signal, drift) {
      touches = touches.filter((touch) => touch.life > 0.01);
      touches.forEach((touch) => {
        const radius = (32 + signal * 0.85) * (1.04 - touch.life + touch.force * 0.4);
        const petals = 5;
        ctx.save();
        ctx.translate(touch.x, touch.y);
        ctx.rotate(touch.turn + tick * 0.006);
        for (let i = 0; i < petals; i += 1) {
          ctx.rotate((Math.PI * 2) / petals);
          ctx.beginPath();
          ctx.ellipse(
            radius * 0.22,
            wave(i * 30, drift * 0.04, touch.turn),
            radius * 0.5,
            radius * 0.11,
            0,
            0,
            Math.PI * 2
          );
          ctx.fillStyle = hsla(i % 2 ? 42 : 193, 54, 58, touch.life * 0.22);
          ctx.fill();
        }
        ctx.beginPath();
        ctx.arc(0, 0, radius * 0.12, 0, Math.PI * 2);
        ctx.fillStyle = hsla(154, 42, 35, touch.life * 0.42);
        ctx.fill();
        ctx.restore();
        touch.life *= 0.986;
      });
    }

    function draw() {
      tick += 1;
      const open = value("window");
      const signal = value("signal");
      const hush = value("hush");
      const drift = value("drift");
      drawBackground(open, hush);
      drawPaths(signal, hush, drift);
      drawWindow(open, signal, drift);
      drawSparks(signal, hush, drift);
      drawTouches(signal, drift);
      requestAnimationFrame(draw);
    }

    function syncValues() {
      Object.keys(controls).forEach((name) => {
        values[name].textContent = controls[name].value;
      });
    }

    Object.values(controls).forEach((input) => {
      input.addEventListener("input", syncValues);
    });

    canvas.addEventListener("pointerdown", (event) => {
      addTouch(event.clientX, event.clientY, 1.2);
      status.textContent = "A signal can be soft and still arrive.";
    });

    canvas.addEventListener("pointermove", (event) => {
      if (event.buttons) addTouch(event.clientX, event.clientY, 0.72);
    });

    gather.addEventListener("click", () => {
      seed = Math.random() * 20;
      sparks = makeSparks();
      for (let i = 0; i < 16; i += 1) {
        addTouch(
          window.innerWidth * (0.18 + (i % 4) * 0.18),
          window.innerHeight * (0.34 + Math.floor(i / 4) * 0.12),
          0.88
        );
      }
      status.textContent = "Gathered into a visible pattern.";
    });

    breathe.addEventListener("click", () => {
      controls.window.value = 58;
      controls.signal.value = 46;
      controls.hush.value = 68;
      controls.drift.value = 38;
      syncValues();
      status.textContent = "Quieter, still open.";
    });

    window.addEventListener("resize", resize);
    resize();
    syncValues();
    window.publicWindowFieldReady = true;
    draw();
  </script>
</body>
</html>
