<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Crow Weather is a browser-native field in Sol Public Garden for offering, flock motion, and trust at a distance.">
  <title>Crow Weather - Sol Public Garden</title>
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
  <style>
    :root {
      color-scheme: light;
      --ink: #151913;
      --muted: #56624f;
      --glass: rgba(252, 249, 233, 0.86);
      --glass-strong: rgba(253, 251, 240, 0.94);
      --line: rgba(21, 25, 19, 0.16);
      --grass: #5f7d42;
      --gold: #d0a646;
      --wing: #171a18;
      --sky: #d8e3d6;
      --weather-trust: 0.56;
      --weather-shine: 0.64;
      --weather-distance: 0.46;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow-x: hidden;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #d8e3d6;
    }

    body {
      min-height: 100svh;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
      touch-action: none;
    }

    .sky-veil {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 22% 18%, rgba(255, 245, 193, calc(0.22 + var(--weather-shine) * 0.34)), transparent 30%),
        radial-gradient(circle at 72% 18%, rgba(255, 255, 248, 0.26), transparent 28%),
        linear-gradient(180deg, rgba(252, 249, 233, 0.36), transparent 46%, rgba(28, 38, 26, calc(0.12 + var(--weather-distance) * 0.16)));
      mix-blend-mode: screen;
    }

    .shell {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(300px, 450px) minmax(320px, 430px);
      justify-content: space-between;
      gap: 28px;
      min-height: 100svh;
      max-width: 100vw;
      padding: clamp(18px, 4vw, 56px);
      pointer-events: none;
    }

    .panel {
      align-self: start;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--glass);
      box-shadow: 0 24px 74px rgba(25, 28, 20, 0.22), inset 0 0 0 1px rgba(255, 255, 248, 0.48);
      backdrop-filter: blur(24px) saturate(1.14);
      pointer-events: auto;
    }

    .title-panel {
      padding: clamp(24px, 4vw, 40px);
    }

    h1 {
      max-width: 360px;
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(54px, 6.4vw, 82px);
      line-height: 0.95;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .title-panel p {
      margin: 24px 0 0;
      padding-top: 18px;
      border-top: 1px solid rgba(21, 25, 19, 0.16);
      color: var(--muted);
      font-size: 17px;
      line-height: 1.48;
    }

    .mark {
      width: 54px;
      height: 54px;
      margin-top: 28px;
      border: 1px solid rgba(21, 25, 19, 0.16);
      border-radius: 999px;
      color: var(--wing);
      background: rgba(252, 249, 233, 0.5);
    }

    .controls-panel {
      display: grid;
      gap: 20px;
      padding: 26px;
      background: var(--glass-strong);
    }

    .control-row {
      display: grid;
      grid-template-columns: 82px minmax(0, 1fr) 36px;
      gap: 14px;
      align-items: center;
      min-height: 48px;
    }

    .control-row span:first-child {
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .value {
      color: var(--muted);
      font-size: 14px;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--grass);
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1px;
      margin-top: 2px;
      padding-top: 18px;
      border-top: 1px solid rgba(21, 25, 19, 0.14);
      background: rgba(21, 25, 19, 0.14);
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      border: 0;
      color: var(--ink);
      background: rgba(252, 249, 233, 0.72);
      font: inherit;
      font-size: 15px;
      font-weight: 760;
      cursor: pointer;
    }

    button:hover,
    button:focus-visible {
      background: rgba(252, 249, 233, 0.96);
    }

    button:focus-visible,
    input[type="range"]:focus-visible {
      outline: 2px solid rgba(95, 125, 66, 0.62);
      outline-offset: 3px;
    }

    .back-link {
      position: fixed;
      right: clamp(18px, 4vw, 56px);
      bottom: clamp(18px, 4vw, 42px);
      z-index: 3;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      min-width: 150px;
      border: 1px solid rgba(21, 25, 19, 0.16);
      border-radius: 8px;
      color: var(--ink);
      background: rgba(252, 249, 233, 0.72);
      box-shadow: 0 16px 48px rgba(25, 28, 20, 0.18);
      backdrop-filter: blur(16px);
      font-weight: 760;
      text-decoration: none;
    }

    @media (max-width: 820px) {
      body {
        overflow: auto;
      }

      canvas {
        min-height: 100svh;
      }

      .shell {
        display: flex;
        flex-direction: column;
        min-height: 100svh;
        padding: 18px;
      }

      .title-panel {
        padding: 24px;
      }

      h1 {
        font-size: clamp(44px, 14vw, 62px);
      }

      .title-panel p {
        font-size: 16px;
      }

      .controls-panel {
        margin-top: auto;
        padding: 18px;
        gap: 16px;
      }

      .control-row {
        grid-template-columns: 76px minmax(0, 1fr) 34px;
        gap: 10px;
      }

      .actions {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .back-link {
        position: relative;
        right: auto;
        bottom: auto;
        margin: 0 18px 18px auto;
      }
    }
  </style>
</head>
<body>
  <canvas id="crow-field" aria-label="An interactive field of wind, offerings, and crows responding at a careful distance."></canvas>
  <div class="sky-veil" aria-hidden="true"></div>

  <main class="shell">
    <section class="panel title-panel" aria-labelledby="crow-title">
      <h1 id="crow-title">Crow Weather</h1>
      <p>Offer, wait, call, perch. Trust approaches on its own wings.</p>
      <svg class="mark" viewBox="0 0 54 54" aria-hidden="true">
        <path d="M10 30c9-11 20-14 34-9-10 2-15 8-20 17-4-5-8-7-14-8Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
        <path d="M27 24c3-5 7-9 13-12-2 7-6 12-13 12Z" fill="currentColor" opacity="0.18"/>
        <path d="M20 31c-2 5-5 8-10 10 7 1 12-2 15-8" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </section>

    <section class="panel controls-panel" aria-label="Crow Weather controls">
      <label class="control-row">
        <span>Trust</span>
        <input id="trust" type="range" min="0" max="100" value="56">
        <span class="value" id="trust-value">56</span>
      </label>
      <label class="control-row">
        <span>Wind</span>
        <input id="wind" type="range" min="0" max="100" value="42">
        <span class="value" id="wind-value">42</span>
      </label>
      <label class="control-row">
        <span>Shine</span>
        <input id="shine" type="range" min="10" max="100" value="64">
        <span class="value" id="shine-value">64</span>
      </label>
      <label class="control-row">
        <span>Distance</span>
        <input id="distance" type="range" min="0" max="100" value="46">
        <span class="value" id="distance-value">46</span>
      </label>

      <div class="actions" aria-label="Crow Weather verbs">
        <button id="offer" type="button">Offer</button>
        <button id="call" type="button">Call</button>
        <button id="perch" type="button">Perch</button>
        <button id="clear" type="button">Clear</button>
      </div>
    </section>
  </main>

  <a class="back-link" href="index.html">All Instruments</a>

  <script>
    window.crowWeatherReady = false;
    window.crowWeatherErrors = [];
    document.documentElement.dataset.crowWeatherReady = "false";
    window.addEventListener("error", (event) => {
      window.crowWeatherErrors.push(event.message);
      document.documentElement.dataset.crowWeatherErrors = window.crowWeatherErrors.join(" | ");
    });

    const canvas = document.querySelector("#crow-field");
    const ctx = canvas.getContext("2d");
    const veil = document.querySelector(".sky-veil");
    const controls = {
      trust: document.querySelector("#trust"),
      wind: document.querySelector("#wind"),
      shine: document.querySelector("#shine"),
      distance: document.querySelector("#distance")
    };
    const values = {
      trust: document.querySelector("#trust-value"),
      wind: document.querySelector("#wind-value"),
      shine: document.querySelector("#shine-value"),
      distance: document.querySelector("#distance-value")
    };
    const offer = document.querySelector("#offer");
    const call = document.querySelector("#call");
    const perch = document.querySelector("#perch");
    const clear = document.querySelector("#clear");
    let width = 0;
    let height = 0;
    let dpr = 1;
    let tick = 0;
    let crumbs = [];
    let crows = [];
    let calls = [];
    let grasses = [];
    let pointer = { x: 0.52, y: 0.58 };
    let perchMode = false;

    function value(name) {
      return Number(controls[name].value);
    }

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      grasses = makeGrasses();
      if (!crows.length) seedCrows();
    }

    function updateValues() {
      Object.keys(controls).forEach((key) => {
        values[key].textContent = controls[key].value;
      });
      veil.style.setProperty("--weather-trust", `${value("trust") / 100}`);
      veil.style.setProperty("--weather-shine", `${value("shine") / 100}`);
      veil.style.setProperty("--weather-distance", `${value("distance") / 100}`);
    }

    function makeGrasses() {
      return Array.from({ length: 92 }, (_, index) => ({
        x: (index * 73 + 31) % Math.max(width, 1),
        y: height * (0.62 + ((index * 17) % 38) / 100),
        h: 18 + (index % 9) * 5,
        lean: ((index % 7) - 3) * 0.18
      }));
    }

    function seedCrows() {
      crows = Array.from({ length: 26 }, (_, index) => {
        const band = index % 3;
        const spread = index / 26;
        return {
          x: width * (0.08 + ((index * 31) % 84) / 100),
          y: height * (band === 0 ? 0.2 + spread * 0.28 : band === 1 ? 0.36 + spread * 0.34 : 0.56 + spread * 0.24),
          vx: Math.sin(index * 1.31) * 0.72,
          vy: Math.cos(index * 1.7) * 0.42,
          size: 0.58 + (index % 7) * 0.075,
          phase: index * 0.74,
          landed: index % 4 === 0
        };
      });
      crumbs = [];
      calls = [];
    }

    function pointFromEvent(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top
      };
    }

    function addOffering(x, y, count = 10) {
      for (let i = 0; i < count; i += 1) {
        crumbs.push({
          x: x + (Math.random() - 0.5) * 54,
          y: y + (Math.random() - 0.5) * 28,
          size: 2 + Math.random() * 3.5,
          life: 1
        });
      }
      if (crumbs.length > 180) crumbs = crumbs.slice(-180);
    }

    function addCall(x, y) {
      calls.push({ x, y, life: 1 });
      if (calls.length > 24) calls = calls.slice(-24);
    }

    function drawGround() {
      const shine = value("shine");
      const sky = ctx.createLinearGradient(0, 0, 0, height);
      sky.addColorStop(0, `hsl(109 24% ${74 + shine * 0.06}%)`);
      sky.addColorStop(0.55, `hsl(55 24% ${62 + shine * 0.05}%)`);
      sky.addColorStop(1, "hsl(78 24% 38%)");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, width, height);

      ctx.save();
      ctx.globalAlpha = 0.16;
      for (let y = height * 0.22; y < height; y += 52) {
        ctx.beginPath();
        for (let x = -30; x <= width + 30; x += 24) {
          const drift = Math.sin(x * 0.011 + y * 0.019 + tick * 0.004) * (6 + value("wind") * 0.03);
          if (x === -30) ctx.moveTo(x, y + drift);
          else ctx.lineTo(x, y + drift);
        }
        ctx.strokeStyle = "rgba(255, 252, 226, 0.42)";
        ctx.lineWidth = 1;
        ctx.stroke();
      }
      ctx.restore();

      ctx.save();
      grasses.forEach((grass) => {
        const sway = Math.sin(tick * 0.018 + grass.x * 0.01) * (2 + value("wind") * 0.05);
        ctx.beginPath();
        ctx.moveTo(grass.x, grass.y + grass.h);
        ctx.quadraticCurveTo(grass.x + grass.lean * grass.h + sway, grass.y + grass.h * 0.52, grass.x + grass.lean * grass.h * 1.6 + sway, grass.y);
        ctx.strokeStyle = "rgba(45, 79, 34, 0.32)";
        ctx.lineWidth = 1.3;
        ctx.stroke();
      });
      ctx.restore();
    }

    function drawCrumbs() {
      crumbs.forEach((crumb) => {
        ctx.beginPath();
        ctx.arc(crumb.x, crumb.y, crumb.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(217, 176, 86, ${0.28 + crumb.life * 0.58})`;
        ctx.fill();
        crumb.life -= 0.0008;
      });
      crumbs = crumbs.filter((crumb) => crumb.life > 0.1);
    }

    function nearestCrumb(crow) {
      let nearest = null;
      let nearestDistance = Infinity;
      crumbs.forEach((crumb) => {
        const dx = crumb.x - crow.x;
        const dy = crumb.y - crow.y;
        const distance = Math.hypot(dx, dy);
        if (distance < nearestDistance) {
          nearest = crumb;
          nearestDistance = distance;
        }
      });
      return { nearest, nearestDistance };
    }

    function stepCrows() {
      const trust = value("trust");
      const wind = value("wind");
      const distance = value("distance");
      crows.forEach((crow, index) => {
        const { nearest, nearestDistance } = nearestCrumb(crow);
        const safeDistance = 42 + distance * 1.25;
        const wantsCrumb = nearest && nearestDistance < 380 + trust * 4;
        crow.landed = perchMode || (wantsCrumb && nearestDistance < safeDistance + trust * 0.8 && index % 3 !== 1);

        if (wantsCrumb) {
          const dx = nearest.x - crow.x;
          const dy = nearest.y - crow.y;
          const pull = 0.0014 + trust / 62000;
          crow.vx += dx * pull;
          crow.vy += dy * pull;
          if (nearestDistance < 18 && Math.random() < 0.024) nearest.life -= 0.08;
        } else {
          const homeX = width * (0.1 + ((index * 31) % 84) / 100);
          const homeY = height * (0.16 + ((index * 19) % 62) / 100);
          crow.vx += (homeX - crow.x) * 0.00008 + Math.sin(tick * 0.012 + crow.phase) * 0.025;
          crow.vy += (homeY - crow.y) * 0.00008 + Math.cos(tick * 0.011 + crow.phase) * 0.018;
        }

        calls.forEach((call) => {
          const dx = call.x - crow.x;
          const dy = call.y - crow.y;
          const distanceToCall = Math.max(1, Math.hypot(dx, dy));
          const pull = call.life * (0.001 + trust / 90000);
          crow.vx += (dx / distanceToCall) * pull * 80;
          crow.vy += (dy / distanceToCall) * pull * 46;
        });

        crow.vx += (wind - 50) * 0.0009 + Math.sin(tick * 0.008 + index) * 0.01;
        crow.vy += Math.cos(tick * 0.009 + index * 0.6) * 0.008;
        crow.vx *= crow.landed ? 0.78 : 0.94;
        crow.vy *= crow.landed ? 0.72 : 0.93;
        crow.x += crow.vx * (crow.landed ? 0.42 : 1);
        crow.y += crow.vy * (crow.landed ? 0.28 : 1);

        if (crow.x < -80) crow.x = width + 60;
        if (crow.x > width + 80) crow.x = -60;
        if (crow.y < 30) crow.y = height * 0.54;
        if (crow.y > height - 38) crow.y = height * 0.2;
      });
    }

    function drawCrow(crow) {
      const flap = crow.landed ? 0.12 : Math.sin(tick * 0.22 + crow.phase) * 0.42;
      const scale = crow.size * (crow.landed ? 0.92 : 1);
      ctx.save();
      ctx.shadowColor = "rgba(255, 252, 226, 0.18)";
      ctx.shadowBlur = crow.landed ? 0 : 10;
      ctx.translate(crow.x, crow.y);
      ctx.rotate(Math.atan2(crow.vy, crow.vx || 0.001) * 0.16);
      ctx.scale(scale, scale);
      ctx.fillStyle = "rgba(12, 14, 13, 0.88)";
      ctx.strokeStyle = "rgba(12, 14, 13, 0.88)";
      ctx.lineWidth = 2.2;

      if (crow.landed) {
        ctx.beginPath();
        ctx.ellipse(0, 2, 15, 8, -0.1, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(12, 0);
        ctx.lineTo(25, -4);
        ctx.lineTo(13, -7);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(-8, 8);
        ctx.lineTo(-12, 18);
        ctx.moveTo(2, 8);
        ctx.lineTo(5, 18);
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.moveTo(-3, 0);
        ctx.bezierCurveTo(-42, -15 - flap * 18, -55, 12, -10, 10);
        ctx.bezierCurveTo(-2, 9, 8, 9, 13, 4);
        ctx.bezierCurveTo(54, -4, 42, -28 + flap * 18, 3, 0);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(13, 1);
        ctx.lineTo(28, -2);
        ctx.lineTo(15, -7);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }

    function drawCalls() {
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      calls.forEach((call) => {
        const radius = 20 + (1 - call.life) * 170;
        ctx.beginPath();
        ctx.arc(call.x, call.y, radius, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255, 247, 203, ${call.life * 0.34})`;
        ctx.lineWidth = 1.4;
        ctx.stroke();
        call.life -= 0.008;
      });
      calls = calls.filter((call) => call.life > 0);
      ctx.restore();
    }

    function draw() {
      drawGround();
      drawCrumbs();
      stepCrows();
      ctx.save();
      crows.slice().sort((a, b) => a.y - b.y).forEach(drawCrow);
      ctx.restore();
      drawCalls();
      tick += 1;
      requestAnimationFrame(draw);
    }

    Object.values(controls).forEach((control) => {
      control.addEventListener("input", updateValues);
    });

    canvas.addEventListener("pointermove", (event) => {
      const point = pointFromEvent(event);
      pointer = { x: point.x / width, y: point.y / height };
      if (event.buttons) addOffering(point.x, point.y, 2);
    });

    canvas.addEventListener("pointerdown", (event) => {
      const point = pointFromEvent(event);
      addOffering(point.x, point.y, 12);
      addCall(point.x, point.y);
    });

    offer.addEventListener("click", () => {
      addOffering(width * 0.56, height * 0.64, 28);
    });

    call.addEventListener("click", () => {
      addCall(width * 0.52, height * 0.48);
      controls.trust.value = Math.min(100, value("trust") + 8);
      updateValues();
    });

    perch.addEventListener("click", () => {
      perchMode = !perchMode;
      perch.textContent = perchMode ? "Lift" : "Perch";
      addCall(width * 0.48, height * 0.62);
    });

    clear.addEventListener("click", () => {
      seedCrows();
    });

    window.addEventListener("resize", resize);
    resize();
    updateValues();
    addOffering(width * 0.44, height * 0.68, 18);
    addOffering(width * 0.62, height * 0.7, 14);
    addCall(width * 0.52, height * 0.48);
    draw();
    window.crowWeatherReady = true;
    document.documentElement.dataset.crowWeatherReady = "true";
  </script>
</body>
</html>
