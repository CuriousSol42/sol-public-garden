<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Soft Fascination Field is an immersive restorative garden instrument in Sol Public Garden.">
  <title>Soft Fascination Field - Sol Public Garden</title>
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
  <style>
    :root {
      color-scheme: light;
      --ink: #10231d;
      --muted: #415a51;
      --line: rgba(16, 35, 29, 0.16);
      --glass: rgba(255, 255, 248, 0.86);
      --glass-strong: rgba(255, 255, 252, 0.92);
      --leaf: #2f7c59;
      --leaf-dark: #174f3c;
      --coral: #de6d5e;
      --gold: #d89f39;
      --water: #78b8cf;
      --weather-light: 0.2;
      --weather-mystery: 0.38;
      --weather-motion: 0.24;
      --weather-return: 0.38;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8faf2;
      overflow-x: hidden;
    }

    body {
      min-height: 100svh;
      overflow: hidden;
      overflow-x: hidden;
    }

    .world {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: #edf5e8;
    }

    .garden-image {
      position: absolute;
      inset: -4vh -4vw;
      width: 108vw;
      height: 108vh;
      object-fit: cover;
      object-position: center;
      filter: saturate(1.08) brightness(1.04);
      transform: scale(1.02);
      transition: filter 240ms ease;
      will-change: filter;
    }

    .world::before,
    .world::after {
      position: absolute;
      inset: 0;
      content: "";
      pointer-events: none;
    }

    .world::before {
      background:
        radial-gradient(circle at 18% 16%, rgba(255, 255, 248, calc(0.48 + var(--weather-light))), transparent 34%),
        radial-gradient(circle at 72% 34%, rgba(255, 241, 210, calc(0.12 + var(--weather-return) * 0.22)), transparent 28%),
        linear-gradient(90deg, rgba(255, 255, 248, 0.42), transparent 32%, rgba(255, 255, 248, 0.18));
      mix-blend-mode: screen;
    }

    .world::after {
      background:
        linear-gradient(180deg, rgba(255, 255, 248, 0.08), transparent 46%, rgba(10, 32, 32, calc(0.12 + var(--weather-mystery) * 0.34))),
        linear-gradient(90deg, rgba(255, 255, 248, calc(0.2 + var(--weather-light) * 0.28)), transparent 42%, rgba(16, 35, 29, calc(0.04 + var(--weather-motion) * 0.16)));
      transition: background 220ms ease;
    }

    #fascination-atmosphere {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      touch-action: none;
      cursor: crosshair;
    }

    .study-shell {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(280px, 500px) minmax(300px, 430px);
      justify-content: space-between;
      gap: 28px;
      min-height: 100svh;
      max-width: 100vw;
      padding: clamp(18px, 4vw, 58px);
      pointer-events: none;
    }

    .glass-panel {
      position: relative;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--glass);
      box-shadow: 0 24px 80px rgba(12, 31, 27, 0.24), 0 0 0 1px rgba(255, 255, 252, 0.38) inset;
      backdrop-filter: blur(28px) saturate(1.18);
      pointer-events: auto;
    }

    .glass-panel::before {
      position: absolute;
      inset: -22px;
      z-index: -1;
      border-radius: 14px;
      background: radial-gradient(circle at 50% 38%, rgba(255, 255, 252, 0.52), transparent 68%);
      content: "";
      pointer-events: none;
    }

    .title-panel {
      align-self: start;
      min-height: 360px;
      padding: clamp(24px, 4vw, 42px);
    }

    .title-mark {
      width: 52px;
      height: 52px;
      margin-top: 28px;
      border: 1px solid rgba(16, 35, 29, 0.18);
      border-radius: 999px;
      color: var(--leaf-dark);
      background: rgba(255, 255, 248, 0.52);
    }

    h1 {
      max-width: 390px;
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(48px, 5.8vw, 76px);
      font-weight: 700;
      line-height: 0.98;
      letter-spacing: 0;
      overflow-wrap: break-word;
      text-wrap: balance;
    }

    .title-panel p {
      margin: 26px 0 0;
      padding-top: 20px;
      border-top: 1px solid rgba(16, 35, 29, 0.18);
      color: var(--muted);
      font-size: 18px;
      line-height: 1.5;
    }

    .controls-panel {
      align-self: start;
      display: grid;
      gap: 24px;
      padding: 28px;
      background: var(--glass-strong);
    }

    .control-row {
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr) 36px;
      gap: 16px;
      align-items: center;
      min-height: 52px;
    }

    .control-row span:first-child {
      color: var(--ink);
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .value {
      color: var(--muted);
      font-size: 14px;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--leaf);
    }

    .study-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1px;
      margin-top: 4px;
      padding-top: 20px;
      border-top: 1px solid rgba(16, 35, 29, 0.16);
      background: rgba(16, 35, 29, 0.14);
    }

    .study-actions button,
    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      border: 0;
      color: var(--ink);
      background: rgba(255, 255, 248, 0.7);
      font: inherit;
      font-size: 16px;
      font-weight: 750;
      text-decoration: none;
      cursor: pointer;
    }

    .study-actions button:hover,
    .study-actions button:focus-visible,
    .back-link:hover {
      color: var(--leaf-dark);
      background: rgba(255, 255, 248, 0.94);
    }

    .study-actions button:focus-visible,
    .back-link:focus-visible,
    input[type="range"]:focus-visible {
      outline: 2px solid rgba(23, 79, 60, 0.62);
      outline-offset: 3px;
    }

    .back-link {
      position: fixed;
      right: clamp(18px, 4vw, 58px);
      bottom: clamp(18px, 4vw, 42px);
      z-index: 3;
      min-width: 156px;
      border: 1px solid rgba(16, 35, 29, 0.16);
      border-radius: 8px;
      background: rgba(255, 255, 248, 0.68);
      box-shadow: 0 16px 50px rgba(12, 31, 27, 0.16);
      backdrop-filter: blur(18px);
      pointer-events: auto;
    }

    .leaf-icon {
      width: 30px;
      height: 30px;
      margin-right: 12px;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    @media (max-width: 860px) {
      body {
        overflow: auto;
      }

      .world,
      #fascination-atmosphere {
        position: fixed;
        min-height: 100svh;
      }

      .garden-image {
        width: 132vw;
        height: 108vh;
        object-position: 58% center;
      }

      .study-shell {
        display: flex;
        flex-direction: column;
        min-height: 100svh;
        padding: 18px;
      }

      .title-panel {
        min-height: auto;
        padding: 24px;
      }

      h1 {
        font-size: clamp(38px, 11vw, 54px);
      }

      .title-panel p {
        font-size: 16px;
      }

      .controls-panel {
        margin-top: auto;
        padding: 18px;
      }

      .control-row {
        grid-template-columns: 82px minmax(0, 1fr) 34px;
        gap: 10px;
      }

      .back-link {
        position: relative;
        right: auto;
        bottom: auto;
        margin: 0 18px 18px auto;
      }
    }
  </style>
</head>
<body class="soft-fascination-field">
  <div class="world" aria-hidden="true">
    <img class="garden-image" src="../assets/garden-hero-clean-2026-06-02.png" alt="">
  </div>
  <canvas id="fascination-atmosphere" aria-label="Soft Fascination Field garden atmosphere with drifting light, water glints, leaf shadows, and touch ripples."></canvas>

  <main class="study-shell">
    <section class="glass-panel title-panel" aria-labelledby="field-title">
      <h1 id="field-title">Soft Fascination Field</h1>
      <p>Tune light, motion, mystery, and return.</p>
      <svg class="title-mark" viewBox="0 0 52 52" aria-hidden="true">
        <path d="M25 38c-7-8-7-17 0-26 7 9 7 18 0 26Z" fill="none" stroke="currentColor" stroke-width="1.7"/>
        <path d="M25 37c-5-6-10-9-16-9 3 7 8 11 16 9Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <path d="M25 37c5-8 11-12 18-13-2 8-8 13-18 13Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
      </svg>
    </section>

    <section class="glass-panel controls-panel" aria-label="Soft Fascination Field controls">
      <label class="control-row">
        <span>Light</span>
        <input id="light" type="range" min="20" max="100" value="72">
        <span class="value" id="light-value">72</span>
      </label>
      <label class="control-row">
        <span>Motion</span>
        <input id="motion" type="range" min="0" max="100" value="38">
        <span class="value" id="motion-value">38</span>
      </label>
      <label class="control-row">
        <span>Mystery</span>
        <input id="mystery" type="range" min="0" max="100" value="66">
        <span class="value" id="mystery-value">66</span>
      </label>
      <label class="control-row">
        <span>Return</span>
        <input id="returning" type="range" min="20" max="100" value="62">
        <span class="value" id="returning-value">62</span>
      </label>

      <div class="study-actions">
        <button id="trace" type="button" title="Press and drag in the garden to trace ripples." aria-label="Trace ripples. Press and drag in the garden.">
          <svg class="leaf-icon" viewBox="0 0 32 32" aria-hidden="true">
            <circle cx="16" cy="16" r="4" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="16" cy="16" r="10" fill="none" stroke="currentColor" stroke-width="1.3"/>
            <path d="M7 23c6-2 11-5 17-14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          Trace
        </button>
        <button id="wander" type="button">
          <svg class="leaf-icon" viewBox="0 0 32 32" aria-hidden="true">
            <path d="M6 25c8-2 14-8 18-18 2 10-2 17-12 21" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M11 20c-3-5-3-9 1-13 3 5 3 10-1 13Z" fill="none" stroke="currentColor" stroke-width="1.4"/>
          </svg>
          Wander
        </button>
        <button id="still" type="button">
          <svg class="leaf-icon" viewBox="0 0 32 32" aria-hidden="true">
            <circle cx="16" cy="16" r="11" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="16" cy="16" r="4" fill="currentColor"/>
          </svg>
          <span id="still-label">Still</span>
        </button>
      </div>
    </section>
  </main>

  <a class="back-link" href="index.html">All Instruments</a>

  <script>
    window.softFascinationReady = false;
    window.softFascinationImmersiveReady = false;
    window.softFascinationErrors = [];
    window.softFascinationImmersiveErrors = window.softFascinationErrors;
    document.documentElement.dataset.softFascinationReady = "false";
    document.documentElement.dataset.softFascinationImmersiveReady = "false";
    window.addEventListener("error", (event) => {
      window.softFascinationErrors.push(event.message);
      document.documentElement.dataset.softFascinationErrors = window.softFascinationErrors.join(" | ");
      document.documentElement.dataset.softFascinationImmersiveErrors = window.softFascinationErrors.join(" | ");
    });

    const canvas = document.querySelector("#fascination-atmosphere");
    const ctx = canvas.getContext("2d");
    const world = document.querySelector(".world");
    const image = document.querySelector(".garden-image");
    const controls = {
      light: document.querySelector("#light"),
      motion: document.querySelector("#motion"),
      mystery: document.querySelector("#mystery"),
      returning: document.querySelector("#returning")
    };
    const values = {
      light: document.querySelector("#light-value"),
      motion: document.querySelector("#motion-value"),
      mystery: document.querySelector("#mystery-value"),
      returning: document.querySelector("#returning-value")
    };
    const trace = document.querySelector("#trace");
    const wander = document.querySelector("#wander");
    const still = document.querySelector("#still");
    const stillLabel = document.querySelector("#still-label");
    let width = 0;
    let height = 0;
    let dpr = 1;
    let tick = 0;
    let seed = 4.18;
    let paused = false;
    let pointer = { x: 0.5, y: 0.5 };
    let ripples = [];
    let motes = [];

    function value(name) {
      return Number(controls[name].value);
    }

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      motes = makeMotes();
    }

    function makeMotes() {
      return Array.from({ length: Math.max(70, Math.round(width / 15)) }, (_, index) => ({
        x: (index * 97 + seed * 41) % Math.max(width, 1),
        y: (index * 53 + seed * 73) % Math.max(height, 1),
        size: 1 + (index % 7) * 0.55,
        drift: 0.12 + (index % 9) * 0.035,
        hue: index % 5 === 0 ? 43 : index % 5 === 1 ? 149 : index % 5 === 2 ? 193 : index % 5 === 3 ? 13 : 92
      }));
    }

    function updateValues() {
      Object.keys(controls).forEach((key) => {
        values[key].textContent = controls[key].value;
      });
      const light = value("light");
      const mystery = value("mystery");
      const motion = value("motion");
      const returning = value("returning");
      image.style.filter = `saturate(${1 + mystery / 460}) brightness(${0.9 + light / 220})`;
      world.style.setProperty("--weather-light", `${light / 100}`);
      world.style.setProperty("--weather-mystery", `${mystery / 100}`);
      world.style.setProperty("--weather-motion", `${motion / 100}`);
      world.style.setProperty("--weather-return", `${returning / 100}`);
    }

    function hsla(hue, saturation, lightness, alpha) {
      return `hsla(${hue} ${saturation}% ${lightness}% / ${alpha})`;
    }

    function addRipple(clientX, clientY, force = 1) {
      ripples.push({
        x: clientX,
        y: clientY,
        life: 1,
        force,
        hue: 42 + Math.random() * 160
      });
      if (ripples.length > 48) ripples = ripples.slice(-48);
    }

    function drawWaterGlints(light, motion, returning) {
      const bandY = height * 0.5;
      const lines = 9;
      const attentionDrift = (pointer.x - 0.5) * (1.2 + motion * 0.025);
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      for (let band = 0; band < lines; band += 1) {
        const base = bandY + band * height * 0.052;
        ctx.beginPath();
        for (let x = -40; x <= width + 40; x += 24) {
          const y = base + Math.sin(x * 0.012 + tick * 0.012 + band + seed + attentionDrift) * (5 + motion * 0.04);
          if (x === -40) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.strokeStyle = `rgba(255, 255, 240, ${0.04 + light / 900 + returning / 1400})`;
        ctx.lineWidth = 1 + band * 0.12;
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawMotes(light, motion, mystery) {
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      const attentionX = (pointer.x - 0.5) * 0.04;
      const attentionY = (pointer.y - 0.5) * 0.035;
      motes.forEach((mote, index) => {
        mote.x += (Math.sin(tick * 0.006 + index) + attentionX) * mote.drift * (0.5 + motion / 80);
        mote.y += (Math.cos(tick * 0.005 + index * 0.4) + attentionY) * mote.drift * (0.25 + motion / 120);
        if (mote.x < -20) mote.x = width + 20;
        if (mote.x > width + 20) mote.x = -20;
        if (mote.y < -20) mote.y = height + 20;
        if (mote.y > height + 20) mote.y = -20;
        const alpha = 0.07 + light / 1400 + mystery / 1300;
        ctx.beginPath();
        ctx.arc(mote.x, mote.y, mote.size + Math.sin(tick * 0.018 + index) * 0.3, 0, Math.PI * 2);
        ctx.fillStyle = hsla(mote.hue, 72, 74, alpha);
        ctx.fill();
      });
      ctx.restore();
    }

    function drawLeafShadows(mystery, returning) {
      ctx.save();
      ctx.globalAlpha = 0.05 + mystery / 950;
      ctx.strokeStyle = "#10231d";
      ctx.lineWidth = 1.2;
      for (let stem = 0; stem < 14; stem += 1) {
        const baseX = stem % 2 === 0 ? width * 0.08 + stem * 13 : width * 0.9 - stem * 12;
        const baseY = height * (0.25 + (stem % 6) * 0.1);
        const lean = (stem % 2 === 0 ? 1 : -1) * (44 + returning * 0.25);
        ctx.beginPath();
        ctx.moveTo(baseX, baseY);
        ctx.quadraticCurveTo(baseX + lean * 0.4, baseY - 60, baseX + lean, baseY - 120);
        ctx.stroke();
        for (let leaf = 0; leaf < 5; leaf += 1) {
          const lx = baseX + lean * (0.2 + leaf * 0.16);
          const ly = baseY - leaf * 22 - 16;
          ctx.beginPath();
          ctx.ellipse(lx, ly, 5 + leaf * 0.5, 13, lean * 0.01, 0, Math.PI * 2);
          ctx.fillStyle = "#10231d";
          ctx.fill();
        }
      }
      ctx.restore();
    }

    function drawRipples(returning, motion) {
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ripples.forEach((ripple) => {
        const radius = 14 + (1 - ripple.life) * (80 + returning * 1.2);
        ctx.beginPath();
        ctx.arc(ripple.x, ripple.y, radius, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255, 255, 238, ${ripple.life * 0.5})`;
        ctx.lineWidth = 1.7 + ripple.force * 1.25;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(
          ripple.x + Math.sin(tick * 0.01 + ripple.hue) * motion * 0.08,
          ripple.y + Math.cos(tick * 0.012 + ripple.hue) * motion * 0.08,
          radius * 0.36,
          0,
          Math.PI * 2
        );
        ctx.fillStyle = `hsla(${ripple.hue} 72% 74% / ${ripple.life * 0.16})`;
        ctx.fill();
        ripple.life -= 0.005 + (100 - returning) / 24000;
      });
      ripples = ripples.filter((ripple) => ripple.life > 0);
      ctx.restore();
    }

    function draw() {
      const light = value("light");
      const motion = value("motion");
      const mystery = value("mystery");
      const returning = value("returning");
      ctx.clearRect(0, 0, width, height);
      drawLeafShadows(mystery, returning);
      drawWaterGlints(light, motion, returning);
      drawMotes(light, motion, mystery);
      drawRipples(returning, motion);

      if (!paused) tick += 1 + motion / 120;
      requestAnimationFrame(draw);
    }

    Object.values(controls).forEach((control) => {
      control.addEventListener("input", () => {
        seed += 0.011;
        addRipple(width * (0.36 + Math.random() * 0.28), height * (0.46 + Math.random() * 0.22), 0.44);
        updateValues();
      });
    });

    trace.addEventListener("click", () => {
      addRipple(width * 0.52, height * 0.62, 1.4);
    });

    wander.addEventListener("click", () => {
      seed = Math.random() * 10;
      controls.motion.value = Math.min(100, value("motion") + 16);
      controls.mystery.value = Math.min(100, value("mystery") + 8);
      addRipple(width * 0.55, height * 0.62, 1.5);
      updateValues();
    });

    still.addEventListener("click", () => {
      paused = !paused;
      stillLabel.textContent = paused ? "Move" : "Still";
      addRipple(width * 0.5, height * 0.5, 0.8);
    });

    canvas.addEventListener("pointermove", (event) => {
      pointer = { x: event.clientX / width, y: event.clientY / height };
      if (event.buttons) addRipple(event.clientX, event.clientY, 0.5);
    });

    canvas.addEventListener("pointerdown", (event) => {
      pointer = { x: event.clientX / width, y: event.clientY / height };
      addRipple(event.clientX, event.clientY, 1.2);
      updateValues();
    });

    window.addEventListener("resize", resize);
    resize();
    updateValues();
    addRipple(width * 0.52, height * 0.64, 1);
    draw();
    window.softFascinationReady = true;
    window.softFascinationImmersiveReady = true;
    document.documentElement.dataset.softFascinationReady = "true";
    document.documentElement.dataset.softFascinationImmersiveReady = "true";
  </script>
</body>
</html>
